  <rect x="720" y="45" width="60" height="70" rx="8" fill="#1e1f22" stroke="#3f4147" stroke-width="1" />
  <g transform="translate(737, 56) scale(0.45)">
    <path d="M40.3,6.2C37.3,4.8 34,3.7 30.6,3C30.2,3.7 29.7,4.6 29.4,5.4C25.8,4.8 22.2,4.8 18.6,5.4C18.3,4.6 17.8,3.7 17.3,3C13.9,3.7 10.7,4.8 7.6,6.2C1.1,16 -0.7,25.5 0.2,34.8C4.2,37.8 8.1,39.7 11.9,40.9C12.9,39.5 13.8,38.1 14.5,36.5C13,35.9 11.6,35.2 10.3,34.4C10.6,34.2 10.9,33.9 11.2,33.7C19.3,37.4 28.2,37.4 36.2,33.7C36.5,33.9 36.8,34.2 37.1,34.4C35.8,35.2 34.4,35.9 32.9,36.5C33.6,38.1 34.5,39.5 35.5,40.9C39.3,39.7 43.2,37.8 47.2,34.8C48.3,24 45.6,14.6 40.3,6.2ZM15.9,29.2C13.5,29.2 11.6,27 11.6,24.4C11.6,21.7 13.5,19.5 15.9,19.5C18.3,19.5 20.2,21.7 20.2,24.4C20.2,27 18.3,29.2 15.9,29.2ZM31.5,29.2C29.1,29.2 27.2,27 27.2,24.4C27.2,21.7 29.1,19.5 31.5,19.5C33.9,19.5 35.8,21.7 35.8,24.4C35.8,27 33.9,29.2 31.5,29.2Z" fill="#5865f2" />
  </g>
  <text x="750" y="102" text-anchor="middle" fill="#b5bac1" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9">Discord</text>

  <!-- ==================== ARROW LABELS ==================== -->

  <!-- "events" label -->
  <rect x="192" y="65" width="44" height="14" rx="3" fill="#2b2d31" />
  <text x="214" y="76" text-anchor="middle" fill="#4e5058" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" font-style="italic">events</text>

  <!-- "HTTP POST" label -->
  <rect x="423" y="65" width="58" height="14" rx="3" fill="#2b2d31" />
  <text x="452" y="76" text-anchor="middle" fill="#5865f2" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="9" font-weight="500">HTTP POST</text>

  <!-- "Rich Presence" label -->
  <rect x="662" y="65" width="56" height="14" rx="3" fill="#2b2d31" />
  <text x="690" y="76" text-anchor="middle" fill="#5865f2" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="8" font-weight="500">Rich Presence</text>

  <!-- ==================== TITLE ==================== -->
  <text x="400" y="175" text-anchor="middle" fill="#4e5058" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10">claude-code-discord-status &#x2014; architecture</text>
</svg>
